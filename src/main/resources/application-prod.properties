# Configuraciones para el entorno de PRODUCCIÓN (prod)
server.port=80

# Configuración de Base de Datos para Producción (Ejemplo: MySQL / PostgreSQL)
# spring.datasource.url=jdbc:mysql://prod-db-server:3306/crud_prod
# spring.datasource.username=${DB_USER}
# spring.datasource.password=${DB_PASSWORD}

# Ocultar consultas SQL en consola por seguridad
spring.jpa.show-sql=false

# Validar la base de datos sin modificar su estructura
spring.jpa.hibernate.ddl-auto=validate
